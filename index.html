<script>
let data = [];

// ⚠️ TARUH API KEY LO DISINI (RISIKO BESAR)
const API_KEY = "ISI_API_KEY_LO_DISINI";

function render() {
  let total = 0;
  let text = "";

  data.forEach((d, i) => {
    total += d.m;
    text += (i+1) + ". " + d.a + " - " + d.m + " menit\n";
  });

  document.getElementById("total").innerText =
    "Total: " + total + " menit";

  document.getElementById("list").innerText =
    text || "Belum ada data";
}

function tambah() {
  const a = document.getElementById("act").value;
  const m = Number(document.getElementById("min").value);

  if (!a || !m) return alert("Isi data dengan benar");

  data.push({ a, m });

  document.getElementById("act").value = "";
  document.getElementById("min").value = "";

  render();
}

async function analisis() {
  if (data.length === 0) return;

  document.getElementById("result").innerText = "Menganalisis...";

  // 🔥 lebih structured
  const total = data.reduce((sum, d) => sum + d.m, 0);

  const daftar = data.map((d, i) =>
    `${i+1}. ${d.a} - ${d.m} menit`
  ).join("\n");

  const prompt = `
Kamu adalah productivity coach yang kritis.

Data aktivitas:
${daftar}

Total waktu: ${total} menit

Tugas kamu:
1. Hitung estimasi waktu produktif vs tidak produktif
2. Berikan analisis tajam (jangan normatif)
3. Berikan saran konkret yang bisa langsung dilakukan
`;

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "user", content: prompt }
        ]
      })
    });

    const json = await res.json();

    document.getElementById("result").innerText =
      json.choices?.[0]?.message?.content || "Error dari AI";

  } catch (err) {
    document.getElementById("result").innerText = "Gagal koneksi ke AI";
  }
}

render();
</script>
